name: CI                          # ① 流水线的显示名，随便起

  on:                               # ② 什么时候触发（对应 Jenkins 的 "Build Triggers"）
    push:
      branches: [ main ]            #    push 到 main 时跑
    pull_request:                   #    有人提 PR 时也跑

  jobs:                             # ③ 一条流水线由若干 job 组成
    build:                          #    这个 job 叫 build
      runs-on: ubuntu-latest        # ④ 跑在哪台机器：GitHub 免费给的全新 Ubuntu
      steps:                        # ⑤ job 里按顺序执行的步骤
        - name: Checkout            #    步骤1：把你的代码拉到那台机器上
          uses: actions/checkout@v4 #    uses = 用别人写好的现成动作

        - name: Set up JDK 21       #    步骤2：装 JDK 21
          uses: actions/setup-java@v4
          with:                     #    with = 给这个动作传参数
            distribution: temurin   #    用 Temurin 这个 JDK 发行版
            java-version: '21'

        - name: Build               #    步骤3：真正干活
          run: ./gradlew build      #    run = 在机器上敲一条 shell 命令