spring:
  application:
    name: modern-boot-lab

  # 既然本机已用 Docker(colima) 起了真 Postgres，默认就激活 postgres profile 连真库，更贴近生产。
  # 想退回零依赖的 H2 内存库快速跑：启动加 --spring.profiles.active=default 覆盖即可。
  profiles:
    active: postgres

  # Flyway：版本化数据库迁移。启动时自动扫 db/migration 下的 V*.sql，按版本号顺序「只跑没跑过的」，
  # 并在 flyway_schema_history 表里记录每个脚本的版本/执行时间/checksum。
  # 加了 flyway-core 依赖即自动启用；下面是默认值，显式写出来方便你看。
  flyway:
    enabled: true
    locations: classpath:db/migration   # 迁移脚本目录（默认值）
    # baseline-on-migrate: 仅当「已有数据的老库」首次接入 Flyway 才需要（给历史库打基线）。
    # 我们是空库从 V1 起步，不需要，保持默认 false。

  # 虚拟线程（Java 21 Project Loom）—— 一行开启。
  # 开启后 Tomcat 每个请求用一根虚拟线程处理，IO 阻塞时几乎零成本，吞吐大幅提升。
  # 你 2.x + Java 8 时代没有这个，是升级到 Boot 3.2+/Java 21 最直接的收益之一。
  threads:
    virtual:
      enabled: true

  # 默认 profile 用 H2 内存库，开箱即跑，不依赖任何外部服务。
  # 生产用 postgres profile（见 application-postgres.yml）。
  datasource:
    url: jdbc:h2:mem:lab;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      # 改成 validate：schema 完全交给 Flyway 建/改，Hibernate 启动时只「校验」实体↔表是否一致，
      # 不再自己动表结构。这正是生产标准组合（Flyway 管变更 + Hibernate 只验），告别 ddl-auto=update 的不确定性。
      ddl-auto: validate
    open-in-view: false         # 关键：关掉 OSIV，避免懒加载在 Controller 层偷偷查库（默认 true 是反模式）
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true             # http://localhost:8080/h2-console 可视化看库

# Actuator：2026 的可观测性入口。只暴露需要的端点，别一把梭全暴露。
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: modern-boot-lab
    purpose: 2026 Spring Boot 教学

# springdoc / Swagger UI 路径（用默认即可，这里显式写出来方便你知道在哪）
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 自定义配置，绑定到 LabProperties record
lab:
  welcome-message: "欢迎来到 2026 Spring Boot 教学项目"
  cache-ttl: 30s
